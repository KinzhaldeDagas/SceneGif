; SceneGIFs OBSE plugin configuration
; Key accepts a single letter, F1-F12, PrintScreen, or a DirectInput scan code. U = 22.
; Format supports gif, png, jpg, bmp, tiff, or engine.

[Screenshot]
Key=U
Format=gif
; Relative paths resolve from the Oblivion root. Absolute Windows paths are allowed.
OutputPath=Screenshots\SceneGIFs

[GIF]
; Production default: 720 px / 12 FPS / 5 seconds / under 3 MB target.
MaxWidth=720
MaxHeight=450
Seconds=5
FPS=12
Colors=256
TargetMB=3
MaxMB=5
Loop=1
